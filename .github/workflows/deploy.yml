name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild periodically so the program (and "upcoming"/"premiere" cutoffs,
    # which freeze at build time) stay fresh. Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build static site
        # base path = "/<repo>" so links work under the project Pages subpath.
        run: uv run vega build --out dist --base "/${GITHUB_REPOSITORY#*/}"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
