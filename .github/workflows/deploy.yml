name: Build & deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Rebuild periodically so the program (and "upcoming"/"premiere" cutoffs,
    # which freeze at build time) stay fresh. Every 6 hours.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          # Cache the uv wheel cache, keyed on uv.lock (restored from run 2 on).
          enable-cache: true
      - name: Cache uv-managed Python
        # The interpreter lives in uv's data dir, outside the wheel cache above.
        uses: actions/cache@v4
        with:
          path: ~/.local/share/uv/python
          key: uv-python-${{ runner.os }}-${{ hashFiles('.python-version') }}
      - name: Install dependencies (cached)
        run: uv sync --frozen
      - name: Build static site
        # Everything above is cached; only this step runs fresh (it fetches the
        # live program). base path = "/<repo>" so links work under the subpath.
        run: uv run vega build --out dist --base "/${GITHUB_REPOSITORY#*/}"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
